x-loki-logging: &loki-logging
  driver: loki
  options:
    loki-url: "http://localhost:3100/loki/api/v1/push"
    loki-batch-size: "1048576"
    loki-retries: "5"
    mode: "non-blocking"
    max-size: "50m"
    max-file: "10"
    keep-file: "true"
    loki-pipeline-stages: |
      - json:
          expressions:
            level: level
            service: service
            worker_id: worker_id
            shard: shard
            event: event
            domain: domain
            status: status
            latency_ms: latency_ms
      - labels:
          level:
          service:
          worker_id:
          event:

services:
  postgres:
    image: postgres:16
    container_name: postgres
    command: >
      -c max_connections=500
      -c max_wal_size=20GB
      -c checkpoint_timeout=15min
      -c shared_buffers=16GB
      -c effective_cache_size=128GB
      -c work_mem=32MB
      -c maintenance_work_mem=2GB
      -c effective_io_concurrency=200
      -c max_parallel_workers=16
      -c max_parallel_workers_per_gather=4
      -c wal_compression=on
    restart: unless-stopped
    environment:
      - POSTGRES_USER=crawler
      - POSTGRES_PASSWORD=crawler
      - POSTGRES_DB=crawlerdb
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U crawler -d crawlerdb'"]
      interval: 600s
      timeout: 60s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  scheduler_control:
    build:
      context: .
      dockerfile: containers/scheduler_control/Dockerfile
    container_name: scheduler_control
    init: true
    restart: unless-stopped
    volumes:
      - ./:/app
      - /data/ipc:/data/ipc
    environment:
      - GOLDEN_DISCOVERY_RANKER_V1_ENABLED=true
      - OFFERER_STRATEGY=golden_discovery_ranker_v1
    logging: *loki-logging

  scheduler_ingest:
    build:
      context: .
      dockerfile: containers/scheduler_ingest/Dockerfile
    container_name: scheduler_ingest
    init: true
    restart: unless-stopped
    volumes:
      - ./:/app
      - /data/ipc:/data/ipc
    environment:
      - GOLDEN_DISCOVERY_RANKER_V1_INGEST_INLINE_ENABLED=true
    logging: *loki-logging

  crawler:
    build:
      context: .
      dockerfile: containers/crawler/Dockerfile
    container_name: crawler
    init: true
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    volumes:
      - ./:/app
      - /data/ipc:/data/ipc
    logging: *loki-logging

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./ops/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
    ports:
      - "3000:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  loki-data:
  grafana-data:
