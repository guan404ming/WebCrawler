services:
  postgres:
    image: postgres:16
    container_name: postgres
    command: >
      -c max_connections=500
      -c max_wal_size=20GB
      -c checkpoint_timeout=15min
    restart: unless-stopped
    environment:
      - POSTGRES_USER=crawler
      - POSTGRES_PASSWORD=crawler
      - POSTGRES_DB=crawlerdb
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U crawler -d crawlerdb'"]
      interval: 600s
      timeout: 60s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  scheduler_control:
    build:
      context: .
      dockerfile: containers/scheduler_control/Dockerfile
    container_name: scheduler_control
    init: true
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
      - /data/ipc:/data/ipc
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  scheduler_ingest:
    build:
      context: .
      dockerfile: containers/scheduler_ingest/Dockerfile
    container_name: scheduler_ingest
    init: true
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
      - /data/ipc:/data/ipc
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  crawler:
    build:
      context: .
      dockerfile: containers/crawler/Dockerfile
    container_name: crawler
    init: true
    depends_on:
      - redis
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    volumes:
      - ./:/app
      - /data/ipc:/data/ipc
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"


