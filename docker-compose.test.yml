name: crawler-loki-test

# Standalone test stack for the Grafana Loki integration.
#
# What this runs (same topology as prod for tuning-fidelity):
#   - loki + grafana             (observability)
#   - scheduler_control          (16 offerers, read-only selection — refills
#                                 IPC queue from prod DB, does NOT update
#                                 should_crawl or write event rows)
#   - crawler                    (16 spiders, writes JSONL to test IPC)
#
# What this deliberately does NOT run:
#   - scheduler_ingest (router/ingestor/extractor would WRITE to the prod DB)
#   - accounting_rolloff         (daily DB maintenance)
#   - postgres                   (we read prod DB; we just never write to it)
#
# Isolation from prod:
#   - Project name 'crawler-loki-test' → separate container namespace.
#   - All IPC goes to ./.test-data/ipc/ on the host (bind mount), NOT /data/ipc.
#   - scheduler_control supervisord is overridden via bind mount so the
#     accounting_rolloff program is disabled and OFFERER_STRATEGY=read_only
#     forces the SELECT-only selection strategy.
#
# Tuning workflow:
#   Edit the four knobs listed below, then:
#     docker compose -f docker-compose.test.yml restart crawler scheduler_control
#   Watch the "Crawler internals" row in Grafana to see how pending/inflight/
#   transferring/slot_queue respond, and the QPS panel to see whether throughput
#   actually improved.
#
#     IPC_DOMAIN_LOW_WATERMARK      → containers/crawler/crawler/settings.py
#     offerer.per_domain_url_cap    → containers/scheduler_control/config/control.test.yaml
#     offerer.max_domain_files      → containers/scheduler_control/config/control.test.yaml
#     offerer.low_watermark_domains → containers/scheduler_control/config/control.test.yaml
#
# Usage:
#   1. One-time host install of the Loki log driver:
#        docker plugin install grafana/loki-docker-driver:3.0.0 \
#            --alias loki --grant-all-permissions
#   2. Build and start:
#        docker compose -f docker-compose.test.yml up -d --build
#   3. Open http://localhost:3000 (admin / admin) → Dashboards → Crawler.
#
# Teardown (run in this order — nothing here touches the prod postgres on
# this host, which is in a different compose project):
#        docker compose -f docker-compose.test.yml down -v --remove-orphans
#        rm -rf .test-data/
#
#   `down -v`            stops + removes test containers, the
#                        crawler-loki-test_default network, and the named
#                        volumes crawler-loki-test_loki-data /
#                        crawler-loki-test_grafana-data. Without -v those
#                        volumes survive and pile up between runs.
#   `--remove-orphans`   drops any stale services renamed since last `up`.
#   `rm -rf .test-data/` host bind-mount for IPC; Docker never deletes it,
#                        so crawl_result JSONL would otherwise accumulate.

x-loki-logging: &loki-logging
  driver: loki
  options:
    loki-url: "http://localhost:3100/loki/api/v1/push"
    loki-batch-size: "400"
    loki-retries: "5"
    mode: "non-blocking"
    max-size: "50m"
    max-file: "10"
    keep-file: "true"
    loki-pipeline-stages: |
      - json:
          expressions:
            level: level
            service: service
            worker_id: worker_id
            shard: shard
            event: event
            domain: domain
            status: status
            latency_ms: latency_ms
      - labels:
          level:
          service:
          worker_id:
          event:

services:
  loki:
    image: grafana/loki:3.0.0
    container_name: crawler-loki-test-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./ops/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  grafana:
    image: grafana/grafana:11.0.0
    container_name: crawler-loki-test-grafana
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
    ports:
      - "3000:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  scheduler_control:
    build:
      context: .
      dockerfile: containers/scheduler_control/Dockerfile
    container_name: crawler-loki-test-scheduler-control
    init: true
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
      - ./.test-data/ipc:/data/ipc
      - ./ops/test/supervisord.scheduler_control.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    logging: *loki-logging

  crawler:
    build:
      context: .
      dockerfile: containers/crawler/Dockerfile
    container_name: crawler-loki-test-crawler
    init: true
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./.test-data/ipc:/data/ipc
    logging: *loki-logging

volumes:
  loki-data:
  grafana-data:
