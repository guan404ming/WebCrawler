name: crawler-loki-test

# Standalone test stack for the Grafana Loki integration.
#
# What this runs (same topology as prod for tuning-fidelity):
#   - loki + grafana             (observability)
#   - scheduler_control          (16 offerers, read-only selection — refills
#                                 IPC queue from prod DB, does NOT update
#                                 should_crawl or write event rows)
#   - crawler                    (16 spiders, writes JSONL to test IPC)
#
# What this deliberately does NOT run in the default `up`:
#   - scheduler_ingest (router/ingestor/extractor would WRITE to the prod DB)
#   - accounting_rolloff         (daily DB maintenance)
#   - postgres                   (we read prod DB; we just never write to it)
#
# Optional 'sitemap' profile — see the dedicated block lower in this file.
# Brings up an isolated mock postgres + sitemap_patroller + a write-isolated
# ingestor for testing the sitemap feature (NTU-CSIE5376/WebCrawler#30)
# without ever writing to prod:
#
#   docker compose -f docker-compose.test.yml --profile sitemap up -d --build
#
# Isolation from prod:
#   - Project name 'crawler-loki-test' → separate container namespace.
#   - All IPC goes to ./.test-data/ipc/ on the host (bind mount), NOT /data/ipc.
#   - scheduler_control supervisord is overridden via bind mount so the
#     accounting_rolloff program is disabled and OFFERER_STRATEGY=read_only
#     forces the SELECT-only selection strategy.
#
# =============================================================================
# Playbook (cheat sheet — copy/paste from here)
# =============================================================================
#
# 0) One-time host setup (skip if already done on this machine):
#
#      docker plugin install grafana/loki-docker-driver:3.0.0 \
#          --alias loki --grant-all-permissions
#      mkdir -p .test-data/ipc
#
#    The mkdir avoids docker creating the bind-mount as root, which would
#    later force you to sudo to clean up.
#
# 1) Build + start:
#
#      docker compose -f docker-compose.test.yml up -d --build
#
# 2) Verify all four containers came up cleanly:
#
#      docker compose -f docker-compose.test.yml ps
#      docker logs -f crawler-loki-test-scheduler-control 2>&1 \
#          | grep -E 'offer\.refill|offer\.error'
#      docker logs -f crawler-loki-test-crawler
#      ls .test-data/ipc/url_queue/crawler_00/ | head
#
#    Expected: 'offer.refill action=refill ...' lines appearing every
#    scan_interval_sec, and domain_*.json files showing up under
#    .test-data/ipc/url_queue/crawler_00/.
#
#    DB connection errors to look out for in scheduler_control logs:
#      - 'could not translate host name "host.docker.internal"' →
#        Docker Engine < 20.10 on this host. Replace the DSN in
#        containers/scheduler_control/config/control.test.yaml with the
#        bridge gateway IP (usually 172.17.0.1).
#      - 'no pg_hba.conf entry for host "172.17.0.x"' → prod postgres
#        pg_hba.conf does not allow the docker bridge subnet. Add a line
#        like 'host all crawler 172.17.0.0/16 md5' on the prod DB and
#        SELECT pg_reload_conf().
#
# 3) Open Grafana → http://<host>:3000   (admin / admin1234)
#
#    The password is intentionally NOT the literal "admin" — Grafana's
#    'must change password' prompt is triggered only by that exact string,
#    so admin1234 lets us go straight to the dashboard.
#
#    If you still get 'Invalid username or password': the grafana volume
#    has an admin row from a previous run that does not match the current
#    env vars (env vars only seed the DB on first init). Two ways out:
#
#      a) Nuke and restart (preferred — matches the test workflow):
#           docker compose -f docker-compose.test.yml down -v
#           docker compose -f docker-compose.test.yml up -d
#
#      b) Reset in place (if you want to keep the loki/grafana volumes):
#           docker exec -it crawler-loki-test-grafana \
#               grafana cli admin reset-admin-password admin1234
#         and if the username itself is wrong:
#           docker exec -it crawler-loki-test-grafana \
#               sqlite3 /var/lib/grafana/grafana.db \
#               'UPDATE "user" SET login="admin" WHERE id=1;'
#
# 4) Tune knobs (no rebuild needed):
#
#    Edit one of:
#      IPC_DOMAIN_LOW_WATERMARK      → containers/crawler/crawler/settings.py
#      offerer.per_domain_url_cap    → containers/scheduler_control/config/control.test.yaml
#      offerer.max_domain_files      → containers/scheduler_control/config/control.test.yaml
#      offerer.low_watermark_domains → containers/scheduler_control/config/control.test.yaml
#    Then:
#
#      docker compose -f docker-compose.test.yml restart scheduler_control crawler
#
#    Watch the 'Crawler internals' row in Grafana for pending/inflight/
#    transferring/slot_queue, and the QPS panel for throughput change.
#
# 5) Teardown — leave NOTHING behind (run BOTH lines):
#
#      docker compose -f docker-compose.test.yml down -v --remove-orphans
#      docker run --rm -v "$(pwd):/host" -w /host alpine rm -rf .test-data
#
#      `down -v`            removes test containers, the
#                           crawler-loki-test_default network, AND the
#                           named volumes crawler-loki-test_loki-data /
#                           crawler-loki-test_grafana-data. Without -v
#                           those volumes survive and the grafana admin
#                           password from this run carries into the next
#                           one (which is exactly what causes the login
#                           gotcha in step 3).
#      `--remove-orphans`   drops stale services renamed since last `up`.
#      The alpine line      replaces a plain `rm -rf .test-data/`. The
#                           plain rm fails on the host because the test
#                           containers run as root and create files /
#                           subdirs inside /data/ipc (= ./.test-data/ipc
#                           on the host) that end up root-owned. A
#                           throwaway alpine container is itself root
#                           inside, mounts the project dir, and can
#                           delete those files without sudo on the host.
#                           Pulls a ~5MB image once on first use.
#
#    Sanity-check teardown was clean (all four should print nothing):
#
#      docker ps -a    --filter name=crawler-loki-test
#      docker volume ls --filter name=crawler-loki-test
#      docker network ls --filter name=crawler-loki-test
#      ls .test-data 2>/dev/null
#
#    None of the above touches the prod postgres container on this host —
#    it lives in a different compose project, with its own /data/postgres
#    bind mount.

x-loki-logging: &loki-logging
  driver: loki
  options:
    loki-url: "http://localhost:3100/loki/api/v1/push"
    loki-batch-size: "400"
    loki-retries: "5"
    mode: "non-blocking"
    max-size: "50m"
    max-file: "10"
    keep-file: "true"
    loki-pipeline-stages: |
      - json:
          expressions:
            level: level
            service: service
            worker_id: worker_id
            shard: shard
            event: event
            domain: domain
            status: status
            latency_ms: latency_ms
      - labels:
          level:
          service:
          worker_id:
          event:

services:
  loki:
    image: grafana/loki:3.0.0
    container_name: crawler-loki-test-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./ops/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  grafana:
    image: grafana/grafana:11.0.0
    container_name: crawler-loki-test-grafana
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      # Grafana hard-codes the 'must change password' prompt to trigger
      # only when the literal password is "admin". Anything else skips it.
      - GF_SECURITY_ADMIN_PASSWORD=admin1234
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
    ports:
      - "3000:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  scheduler_control:
    build:
      context: .
      dockerfile: containers/scheduler_control/Dockerfile
    container_name: crawler-loki-test-scheduler-control
    init: true
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
      - ./.test-data/ipc:/data/ipc
      - ./ops/test/supervisord.scheduler_control.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    logging: *loki-logging

  crawler:
    build:
      context: .
      dockerfile: containers/crawler/Dockerfile
    container_name: crawler-loki-test-crawler
    init: true
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./.test-data/ipc:/data/ipc
    logging: *loki-logging

  # =============================================================================
  # Sitemap patroller test stack (profile: sitemap)
  # =============================================================================
  #
  # Independent from the offerer/crawler stack above. Brings up:
  #   - test_postgres            (mock crawlerdb — receives all writes)
  #   - db_bootstrap             (one-shot: copies a sample of prod
  #                               domain_state into mock, then runs the
  #                               domain_sitemap migration on mock)
  #   - sitemap_patroller        (discover + patrol workers, mock DSN)
  #   - scheduler_ingest_test    (ingestor only — no router/extractor/stats
  #                               — consumes the sitemap-produced IPC and
  #                               writes to mock, NEVER prod)
  #
  # Prod DB is touched read-only ONCE by db_bootstrap (SELECT from
  # domain_state and shard_split_subdomain). Every other write goes to
  # test_postgres.
  #
  # Start (loki/grafana come up automatically because they have no profile):
  #
  #     docker compose -f docker-compose.test.yml --profile sitemap up -d --build
  #
  # Tail the patrol cycle:
  #
  #     docker logs -f crawler-loki-test-sitemap-patroller \
  #         | grep -E 'discover\.done|patrol\.done|patrol\.start'
  #
  # Confirm the ingestor saw at least one batch:
  #
  #     docker logs crawler-loki-test-scheduler-ingest-test \
  #         | grep ingest.folder_done | head
  #
  # End-to-end verification (counts rows in mock):
  #
  #     docker exec crawler-loki-test-postgres \
  #         psql -U crawler -d crawlerdb_test -c '\dt domain_sitemap'
  #     uv run scripts/test_verify_sitemap_e2e.py \
  #         --mock-dsn 'postgresql://crawler:crawler@127.0.0.1:5434/crawlerdb_test'
  #
  # Teardown is the same `down -v --remove-orphans` line as the main stack;
  # it also drops the postgres-test-data volume.

  test_postgres:
    image: postgres:16
    container_name: crawler-loki-test-postgres
    profiles: [sitemap]
    restart: unless-stopped
    environment:
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler
      POSTGRES_DB: crawlerdb_test
    volumes:
      # /docker-entrypoint-initdb.d/ runs *.sql files on FIRST start only.
      # If you change the DDL, you must `down -v` to drop the postgres-test-data
      # volume — otherwise the init file is skipped on subsequent boots.
      - ./ops/test/init-mock-db.sql:/docker-entrypoint-initdb.d/01-init-schema.sql:ro
      - postgres-test-data:/var/lib/postgresql/data
    ports:
      # Map to host 5434. The DB server already has prod crawlerdb on 5432
      # and prod metricdb on 5433 (see scripts/constants.py), so 5434 is
      # the first free port that won't collide.
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler -d crawlerdb_test"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  db_bootstrap:
    build:
      context: .
      dockerfile: containers/sitemap_patroller/Dockerfile
    container_name: crawler-loki-test-db-bootstrap
    profiles: [sitemap]
    depends_on:
      test_postgres:
        condition: service_healthy
    extra_hosts:
      # Same trick scheduler_control uses to reach prod from inside a
      # container on the DB host (see comments in control.test.yaml).
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
    environment:
      PYTHONPATH: /app
    # One-shot: copies prod domain_state subset to mock, then runs the
    # sitemap migration on mock. Exits 0 on success → other services can
    # depend on service_completed_successfully.
    command:
      # scripts/ is not a package (no __init__.py), so we invoke by file path.
      # PYTHONPATH=/app lets the script's `from libs...` imports resolve, and
      # the script self-adds /app/scripts to sys.path for the sibling
      # migrate_add_domain_sitemap import.
      - python
      - /app/scripts/test_bootstrap_mock_db.py
      - --prod-dsn
      - postgresql://crawler:crawler@host.docker.internal:5432/crawlerdb
      - --mock-dsn
      - postgresql://crawler:crawler@test_postgres:5432/crawlerdb_test
      - --score-min
      - "0.95"
      - --domain-limit
      - "20"
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  sitemap_patroller:
    build:
      context: .
      dockerfile: containers/sitemap_patroller/Dockerfile
    container_name: crawler-loki-test-sitemap-patroller
    profiles: [sitemap]
    init: true
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
      db_bootstrap:
        condition: service_completed_successfully
    volumes:
      - ./:/app
      - ./.test-data/ipc:/data/ipc
      # Bind-mount the test config OVER the prod config inside the image
      # so the patroller reads the mock DSN + fast loop intervals.
      - ./containers/sitemap_patroller/config/sitemap.test.yaml:/app/containers/sitemap_patroller/config/sitemap.yaml:ro
    logging: *loki-logging

  scheduler_ingest_test:
    build:
      context: .
      dockerfile: containers/scheduler_ingest/Dockerfile
    container_name: crawler-loki-test-scheduler-ingest-test
    profiles: [sitemap]
    init: true
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
      db_bootstrap:
        condition: service_completed_successfully
    volumes:
      - ./:/app
      - ./.test-data/ipc:/data/ipc
      # Test supervisord: runs ONLY [program:ingestor]. No router (would
      # need crawler_NN/ inputs), no extractor, no stats_aggregator.
      - ./ops/test/supervisord.scheduler_ingest_test.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    logging: *loki-logging

volumes:
  loki-data:
  grafana-data:
  postgres-test-data:
