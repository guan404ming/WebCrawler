[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[unix_http_server]
file=/tmp/supervisor.sock

[program:offerer]
directory=/app
process_name=%(program_name)s_%(process_num)02d
command=python -m containers.scheduler_control.offerer.main --config /app/containers/scheduler_control/config/control.test.yaml --offerer-id %(process_num)d
numprocs=1
numprocs_start=0
; TEMP: paired with offerer.id_end=0 in control.test.yaml.
; Bump back to 16 after idx_domain_state_shard_score is created.
environment=PYTHONPATH="/app",OFFERER_STRATEGY="read_only"
autostart=true
autorestart=true
startretries=20
stopsignal=TERM
stopwaitsecs=5
killasgroup=true
stopasgroup=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
