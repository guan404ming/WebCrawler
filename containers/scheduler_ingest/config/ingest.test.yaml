# scheduler_ingest test config for docker-compose.test.yml.
#
# Used by the test-only ingestor (no router / no extractor / no stats —
# see ops/test/supervisord.scheduler_ingest_test.conf). Points at the
# in-stack MOCK postgres so writes never reach prod.
#
# interval_minutes is shortened from prod's 10 so the FolderReader's
# `now >= start + 2 * interval_minutes` readiness gate clears in ~2 min,
# letting the test verify end-to-end without long waits.

router:
  progress_template: "/data/ipc/progress/router/{id:02d}.json"
  crawler_dir_template: "/data/ipc/crawl_result/crawler_{id:02d}"
  ingestor_dir_template: "/data/ipc/crawl_result/ingestor_{id:02d}"
  stats_dir: "/data/ipc/stats"
  interval_minutes: 1

  num_shards: 256
  shards_per_ingestor: 16

  # Match prod overrides so routing decisions in the test agree with
  # what would happen in prod.
  domain_overrides:
    wikipedia.org: 0
    x.com: 32
    youtube.com: 64
    reddit.com: 96
    instagram.com: 128
    espn.com: 160
    facebook.com: 192
    yahoo.com: 224

ingestor:
  progress_template: "/data/ipc/progress/ingestor/{id:02d}.json"
  result_dir_template: "/data/ipc/crawl_result/ingestor_{id:02d}"
  stats_dir: "/data/ipc/stats"
  interval_minutes: 1

extractor:
  progress_template: "/data/ipc/progress/extractor/{id:02d}.json"
  result_dir_template: "/data/ipc/crawl_result/ingestor_{id:02d}"
  stats_dir: "/data/ipc/stats"
  interval_minutes: 1

stats:
  stats_dir: "/data/ipc/stats"
  bad_dir: "/data/ipc/stats/bad"

postgres:
  dsn: "postgresql+psycopg2://crawler:crawler@test_postgres:5432/crawlerdb_test"

golden_discovery_ranker_v1:
  # Disabled in the test stack — no artifact mount.
  ingest_inline_enabled: false
