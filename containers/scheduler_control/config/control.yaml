offerer:
  # Offerer IDs to run (inclusive)
  id_start: 0
  id_end: 15

  # Disk path
  # The crawler id equals offerer id by default in this mapping.
  queue_dir_template: "/data/ipc/url_queue/crawler_{id:02d}"
  stats_dir: "/data/ipc/stats"

  # Shard assignment rule
  total_shards: 256
  shards_per_offerer: 16

  # Refill policy (per-domain)
  scan_interval_sec: 60
  max_domain_files: 200
  low_watermark_domains: 120
  per_domain_url_cap: 100


postgres:
  dsn: "postgresql+psycopg2://crawler:crawler@172.16.191.1:5432/crawlerdb"

gc:
  total_shards: 256

  # Frontier budget. Freeze a domain (stop inserting its newly discovered
  # links) once it holds more than frontier_cap pending URLs AND its lifetime
  # fetch-success rate is below yield_floor. Tuned from production: trap
  # domains sit at <0.1% yield with tens of millions pending, healthy domains
  # clear ~2%+, so a 1% floor separates them with margin.
  frontier_cap: 1000000
  yield_floor: 0.01
  sample_percent: 0.5

  # Eviction. should_crawl=TRUE means never scheduled (so never fetched); a
  # URL the offerer has had this many days to schedule and never did is dead
  # frontier weight. Frozen-domain frontier drains faster.
  stale_pending_days: 60
  frozen_pending_days: 7
  batch_size: 5000

  # Daily UTC schedule, offset from accounting (03:00) to avoid overlap.
  run_hour_utc: 4
  run_minute_utc: 0
  check_interval_sec: 3600
  catch_up_on_start: true

accounting:
  total_shards: 256
  event_retention_days: 90
  batch_size: 1000

  # Daily UTC schedule for rolling out aged counters.
  run_hour_utc: 3
  run_minute_utc: 0

  # Polling cadence for schedule check.
  check_interval_sec: 3600

  # If the service starts after today's schedule, run immediately once.
  catch_up_on_start: true

golden_discovery_ranker_v1:
  # Disabled by default so the production image can be reviewed/deployed before
  # the ranker artifact is mounted. Enable with GOLDEN_DISCOVERY_RANKER_V1_ENABLED=true.
  enabled: false
  artifact_path: "/app/artifacts/golden_discovery_ranker_v1.joblib"
  total_shards: 256
  num_workers: 16
  batch_size: 1000
  scan_interval_sec: 60
  max_batches_per_shard: 4
  # Domain-priority steering: when on, the scorer only picks unscored URLs
  # whose domain has `domain_state.domain_score > 0` (i.e. golden-tagged),
  # ordered domain_score DESC then first_seen ASC. When off, the scorer
  # falls back to the legacy first_seen-ASC pool across all domains. Default
  # off; flip on after `domain_state.domain_score` has been populated via the
  # tier-write cron. Override per-env with
  # GOLDEN_DISCOVERY_RANKER_V1_DOMAIN_PRIORITY_STEERING_ENABLED=true.
  domain_priority_steering_enabled: false
